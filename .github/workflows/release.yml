name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_26.3.app
        xcodebuild -version

    - name: Generate version number
      id: version
      run: |
        export TZ=America/Vancouver
        VERSION=$(date +'%Y.%m.%d.%H%M')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"

    - name: Run tests
      run: |
        xcodebuild -scheme YamlQuickLook \
          -destination 'platform=macOS' \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          MACOSX_DEPLOYMENT_TARGET=15.0 \
          test

    - name: Build release
      run: |
        xcodebuild -scheme YamlQuickLook \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          clean build

    - name: Verify app bundle
      run: |
        ls -la build/Build/Products/Release/YamlQuickLook.app/
        ls -la build/Build/Products/Release/YamlQuickLook.app/Contents/PlugIns/

    - name: Create release artifact
      run: |
        cd build/Build/Products/Release
        ditto -c -k --keepParent YamlQuickLook.app \
          "$GITHUB_WORKSPACE/YamlQuickLook-${{ steps.version.outputs.version }}.zip"

    - name: Check and create version tag
      id: daily_tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        export TZ=America/Vancouver
        DAILY_TAG="${{ steps.version.outputs.version }}"
        echo "daily_tag=$DAILY_TAG" >> $GITHUB_OUTPUT

        if git tag -l "$DAILY_TAG" | grep -q "$DAILY_TAG"; then
          echo "Tag $DAILY_TAG already exists, skipping release"
          echo "should_release=false" >> $GITHUB_OUTPUT
        else
          echo "Creating new tag $DAILY_TAG"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "$DAILY_TAG"
          git push origin "$DAILY_TAG"
          echo "should_release=true" >> $GITHUB_OUTPUT
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: YamlQuickLook-${{ steps.version.outputs.version }}
        path: YamlQuickLook-${{ steps.version.outputs.version }}.zip

    - name: Generate release notes
      if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/main' && steps.daily_tag.outputs.should_release == 'true'))
      id: release_notes
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        LAST_TAG=$(git tag --sort=-creatordate | grep -v "$VERSION" | head -n 1 || echo "")

        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- %s (%h)" -10)
        else
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)")
        fi

        cat > release_notes.md << EOF
        ${COMMITS}

        ---
        ### Installation

        1. Download \`YamlQuickLook-${VERSION}.zip\`
        2. Unzip and move \`YamlQuickLook.app\` to \`/Applications\`
        3. Open the app once to register the extension
        4. Enable in System Settings > Privacy & Security > Extensions > Quick Look

        This build is unsigned. Remove quarantine after installation:

        \`\`\`bash
        xattr -cr /Applications/YamlQuickLook.app
        killall Finder && qlmanage -r && qlmanage -r cache
        \`\`\`
        EOF

        echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

    - name: Create Release
      if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/main' && steps.daily_tag.outputs.should_release == 'true'))
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.daily_tag.outputs.daily_tag }}
        name: YAML Quick Look ${{ steps.version.outputs.version }}
        body_path: release_notes.md
        files: YamlQuickLook-${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
